name: Crawl Books

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate books.json
        env:
          CREATORS_API_CLIENT_ID: ${{ secrets.CREATORS_API_CLIENT_ID }}
          CREATORS_API_CLIENT_SECRET: ${{ secrets.CREATORS_API_CLIENT_SECRET }}
          CREATORS_API_SCOPE: ${{ secrets.CREATORS_API_SCOPE }}
          CREATORS_API_SEARCH_ITEMS_URL: ${{ secrets.CREATORS_API_SEARCH_ITEMS_URL }}
          CREATORS_API_TOKEN_URL: ${{ secrets.CREATORS_API_TOKEN_URL }}
          CREATORS_API_MARKETPLACE: www.amazon.co.jp
          CREATORS_API_CREDENTIAL_VERSION: "3.3"
          ASSOCIATE_TAG: ${{ secrets.ASSOCIATE_TAG }}
        run: npm run build

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/books.json docs/books.json docs/books-flat.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update books.json"
          git push
